<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KCG Select CTA - Functional Select Demo</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link rel="stylesheet" href="assets/style.css">
</head>
<body>    
    <div class="demo-section">
        <div class="kcg-select-cta-container">
            <div class="kcg-cta-content">
                <span class="kcg-cta-text">I want to</span>
                <div class="kcg-select-wrapper">
                    <select id="kcg-auto-select-2" class="kcg-auto-select" data-speed="3000">
                        <option value="buy now">buy now</option>
                        <option value="learn more">learn more</option>
                        <option value="get support">get support</option>
                        <option value="contact sales">contact sales</option>
                        <option value="view demos">view demos</option>
                        <option value="start trial">start trial</option>
                    </select>
                </div>
                <a href="/contact" class="kcg-cta-button">Start Now</a>
            </div>
        </div>
    </div>

    <script src="assets/script-simple.js"></script>
</body>
</html>
